<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SIGNAL — AL-HADID</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0C0C10;font-family:'Courier New',monospace;color:#fff}

.page{position:fixed;inset:0;display:flex;flex-direction:column}

/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid rgba(255,255,255,0.08);font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.35);flex-shrink:0}

/* SPLIT LAYOUT */
.split{flex:1;display:flex;min-height:0}

/* LEFT COL */
.col-left{width:42%;border-right:0.5px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;padding:12px 10px;gap:8px;overflow:hidden}

.col-left-top{font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;padding-bottom:6px;border-bottom:0.5px solid rgba(255,255,255,0.1)}

.globes{display:flex;flex-direction:column;gap:9px;flex:1;justify-content:center}
.globe-row{display:flex;align-items:center;gap:6px;opacity:0;animation:fade-in 0.5s ease forwards}
.globe-row svg{flex-shrink:0}
.globe-row span{font-size:6px;color:rgba(255,255,255,0.2);letter-spacing:1px}

@keyframes fade-in{to{opacity:1}}
.globe-row:nth-child(1){animation-delay:0.1s}
.globe-row:nth-child(2){animation-delay:0.25s}
.globe-row:nth-child(3){animation-delay:0.4s}
.globe-row:nth-child(4){animation-delay:0.55s}
.globe-row:nth-child(5){animation-delay:0.7s}
.globe-row:nth-child(6){animation-delay:0.85s}

.vertical-text{writing-mode:vertical-rl;transform:rotate(180deg);font-size:16px;font-weight:900;letter-spacing:4px;color:#fff;text-transform:uppercase;text-align:center;flex-shrink:0;padding:8px 0}

.col-left-bottom{font-size:7px;color:rgba(255,255,255,0.3);letter-spacing:1px;padding-top:6px;border-top:0.5px solid rgba(255,255,255,0.08)}

/* RIGHT COL */
.col-right{flex:1;display:flex;flex-direction:column;padding:12px 12px;gap:10px;overflow:hidden}

.col-right-top{display:flex;justify-content:space-between;font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.3);flex-shrink:0}

/* PLANET */
.planet-wrap{display:flex;justify-content:center;flex-shrink:0}
.planet{width:clamp(130px,42vw,165px);height:clamp(130px,42vw,165px);border-radius:50%;background:radial-gradient(circle at 35% 28%,#90CCFF,#2266EE 45%,#0A2880 75%,#050F40);box-shadow:0 0 40px rgba(30,100,255,0.35),0 0 80px rgba(30,100,255,0.1);position:relative;overflow:hidden;animation:planet-rotate 20s linear infinite}
@keyframes planet-rotate{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(12deg)}}
/* Cloud swirls */
.planet::before{content:'';position:absolute;top:25%;left:10%;width:70%;height:18%;border-radius:50%;background:rgba(255,255,255,0.08);transform:rotate(-8deg)}
.planet::after{content:'';position:absolute;top:55%;left:20%;width:55%;height:14%;border-radius:50%;background:rgba(255,255,255,0.06);transform:rotate(5deg)}

/* Signal info */
.signal-info{flex-shrink:0}
.signal-label{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:3px}
.signal-title{font-size:24px;font-weight:900;color:#fff;letter-spacing:-0.5px;line-height:1}

/* Warning */
.warning-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.triangle{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:18px solid #FFB520;position:relative;flex-shrink:0}
.triangle::after{content:'!';position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:900;color:#000;line-height:1}
.warning-text{font-size:7px;color:rgba(255,255,255,0.4);line-height:1.5;letter-spacing:0.5px}

/* Barcode */
.barcode-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qr-box{width:36px;height:36px;display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex-shrink:0}
.qr-box span{background:#fff;border-radius:1px}
.qr-box span.off{background:transparent}

/* FOOTER */
.footer{padding:8px 14px;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.2);flex-shrink:0;text-transform:uppercase}
</style>
</head>
