<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050510">
  <title>Subtext</title>
  <style>
    :root {
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
      --blue: #4a9eff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #050510;
      overflow: hidden;
      font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: #fff;
    }

    /* ══ LOADER ══════════════════════════════════════════════════ */
    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: #050510;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.7s ease;
      background-image:
        linear-gradient(rgba(74,158,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,158,255,0.05) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }

    /* Scanline */
    #loader::before {
      content: '';
      position: absolute; left: 0; right: 0; height: 120px;
      background: linear-gradient(to bottom,
        transparent,
        rgba(74,158,255,0.04) 40%,
        rgba(74,158,255,0.07) 50%,
        rgba(74,158,255,0.04) 60%,
        transparent);
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan { from { top: -120px; } to { top: 100%; } }

    /* Glitch horizontal bar */
    #glitch-bar {
      position: fixed; left: 0; right: 0; height: 2px;
      background: rgba(255,255,255,0.65);
      pointer-events: none; z-index: 300; opacity: 0;
      mix-blend-mode: overlay;
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: rgba(74,158,255,0.35);
      border-style: solid;
    }
    .corner.tl { top: calc(var(--safe-top) + 16px); left: 16px;  border-width: 1px 0 0 1px; }
    .corner.tr { top: calc(var(--safe-top) + 16px); right: 16px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: calc(var(--safe-bottom) + 16px); left: 16px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom: calc(var(--safe-bottom) + 16px); right: 16px; border-width: 0 1px 1px 0; }

    /* HUD data corners */
    .hud {
      position: absolute;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 9px;
      color: rgba(74,158,255,0.45);
      letter-spacing: 1px;
      line-height: 2;
    }
    .hud.tl { top: calc(var(--safe-top) + 40px); left: 20px; }
    .hud.tr { top: calc(var(--safe-top) + 40px); right: 20px; text-align: right; }
    .hud.bl { bottom: calc(var(--safe-bottom) + 40px); left: 20px; }
    .hud.br { bottom: calc(var(--safe-bottom) + 40px); right: 20px; text-align: right; }

    /* Loader center */
    .loader-body {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .loader-eyebrow {
      font-family: 'SF Mono', monospace;
      font-size: 9px; letter-spacing: 6px; text-transform: uppercase;
      color: rgba(74,158,255,0.4);
    }

    /* Glitch wordmark */
    .loader-wordmark {
      font-size: 52px; font-weight: 700; letter-spacing: -3px;
      color: #ffffff;
      text-shadow: 0 0 60px rgba(74,158,255,0.25);
      position: relative;
    }
    .loader-wordmark::before,
    .loader-wordmark::after {
      content: attr(data-text);
      position: absolute; top: 0; left: 0;
      font-size: inherit; font-weight: inherit; letter-spacing: inherit;
      width: 100%; white-space: nowrap; opacity: 0;
    }
    .loader-wordmark::before { color: #ff2050; }
    .loader-wordmark::after  { color: #00e5ff; }
    .loader-wordmark.glitching::before { opacity: 1; animation: glitch-r 0.22s steps(4) forwards; }
    .loader-wordmark.glitching::after  { opacity: 1; animation: glitch-c 0.22s steps(4) forwards; }
    .loader-wordmark.glitching         { animation: glitch-base 0.22s steps(4) forwards; }

    @keyframes glitch-base {
      0%   { transform: translate(-2px, 0) skewX(1deg); }
      25%  { transform: translate(3px, 0) skewX(-0.5deg); }
      50%  { transform: translate(-1px, 1px); }
      75%  { transform: translate(2px, 0) skewX(0.5deg); }
      100% { transform: translate(0); }
    }
    @keyframes glitch-r {
      0%   { clip-path: inset(15% 0 72% 0); transform: translate(-5px, 0); }
      25%  { clip-path: inset(48% 0 38% 0); transform: translate(5px, 2px); }
      50%  { clip-path: inset(82% 0 8% 0);  transform: translate(-3px, 0); }
      75%  { clip-path: inset(60% 0 25% 0); transform: translate(3px, -1px); }
      100% { clip-path: inset(0 0 100% 0);  transform: translate(0); opacity: 0; }
    }
    @keyframes glitch-c {
      0%   { clip-path: inset(68% 0 18% 0); transform: translate(5px, 0); }
      25%  { clip-path: inset(30% 0 52% 0); transform: translate(-5px, -2px); }
      50%  { clip-path: inset(5% 0 85% 0);  transform: translate(3px, 0); }
      75%  { clip-path: inset(40% 0 45% 0); transform: translate(-3px, 1px); }
      100% { clip-path: inset(0 0 100% 0);  transform: translate(0); opacity: 0; }
    }

    .loader-rule {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, rgba(74,158,255,0.4), transparent);
      margin: -8px 0;
    }
    .progress-track {
      width: 180px; height: 1px;
      background: rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
    }
    .progress-fill {
      position: absolute; top: 0; left: 0;
      height: 100%; width: 0%;
      background: linear-gradient(90deg, rgba(74,158,255,0.5), #fff);
      box-shadow: 0 0 6px rgba(74,158,255,0.7);
      transition: width 0.08s linear;
    }
    .loader-status-text {
      font-family: 'SF Mono', monospace;
      font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(74,158,255,0.55);
      min-height: 14px;
    }

    @keyframes blink { 50% { opacity: 0; } }
    .blink { animation: blink 0.9s step-end infinite; }

    /* ══ GAME ════════════════════════════════════════════════════ */
    #game {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.9s ease;
    }
    #game.on { opacity: 1; pointer-events: all; }

    /* Background canvas */
    #bg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* Faint grid overlay */
    #game::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,158,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,158,255,0.016) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none; z-index: 1;
    }

    /* ── HUD header ── */
    #hud-bar {
      flex-shrink: 0;
      height: calc(44px + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 16px; padding-right: 20px;
      font-family: 'SF Mono', monospace;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(74,158,255,0.25);
      border-bottom: 0.5px solid rgba(74,158,255,0.06);
      background: rgba(5,5,16,0.9);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 20; position: relative;
    }

    /* Back button */
    #back-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(74,158,255,0.5);
      font-family: inherit; font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; margin: -8px -10px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #back-btn:hover  { color: rgba(74,158,255,0.8); }
    #back-btn:active { background: rgba(74,158,255,0.1); }
    #back-btn svg { width: 10px; height: 10px; }

    /* ══ VISUAL ZONE ═════════════════════════════════════════════ */
    #visual-zone {
      flex-shrink: 0;
      height: clamp(180px, 40%, 320px);
      position: relative; z-index: 10;
      overflow: hidden;
      border-bottom: 0.5px solid rgba(74,158,255,0.08);
    }

    /* Scanline overlay */
    #visual-zone::after {
      content: '';
      position: absolute; inset: 0; z-index: 5;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
    }

    /* Bottom fade in visual zone */
    #visual-zone::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      background: linear-gradient(to bottom, transparent, #050510);
      pointer-events: none; z-index: 6;
    }

    #visual-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      position: relative; z-index: 2;
      image-rendering: pixelated;
    }

    /* Glitch overlay canvas */
    #glitch-cv {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
    }

    /* Corner brackets in visual zone */
    .v-corner {
      position: absolute;
      width: 14px; height: 14px;
      border-color: rgba(74,158,255,0.2);
      border-style: solid;
      z-index: 7;
    }
    .v-corner.tl { top: 10px; left: 10px;  border-width: 1px 0 0 1px; }
    .v-corner.tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
    .v-corner.bl { bottom: 10px; left: 10px;  border-width: 0 0 1px 1px; }
    .v-corner.br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    #scene-label {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      font-family: 'SF Mono', monospace;
      font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(74,158,255,0.2);
      z-index: 7; white-space: nowrap;
    }

    /* ══ DIALOGUE ════════════════════════════════════════════════ */
    #dialogue {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 16px;
      display: flex; flex-direction: column; justify-content: flex-end; gap: 28px;
      position: relative; z-index: 10;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #dialogue::-webkit-scrollbar { display: none; }

    .msg {
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      position: relative; z-index: 1;
    }
    .msg.in  { opacity: 1; transform: none; }
    .msg.dim { opacity: 0.77; z-index: 0; }

    /* Narrator */
    .msg-narrator {
      text-align: center;
      font-style: italic;
      font-size: 16px; line-height: 1.75;
      color: rgba(255,255,255,0.45);
      padding: 0 20px;
    }

    /* Lia */
    .msg-lia {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .lia-label {
      font-family: 'SF Mono', monospace;
      font-size: 8px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(74,158,255,0.5);
    }
    .lia-bubble {
      background: #ffffff;
      color: #090912;
      border-radius: 20px;
      padding: 18px 22px;
      max-width: 320px; width: 100%;
      font-size: 16px; line-height: 1.65;
      font-weight: 400; letter-spacing: -0.15px;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.15),
        0 8px 32px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.3);
      transition: min-height 0.22s ease;
      overflow: hidden;
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 1.5px; height: 1em;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.7s step-end infinite;
    }
    .msg-narrator .cursor { background: rgba(255,255,255,0.5); }
    .lia-bubble    .cursor { background: #090912; }

    /* ══ CHOICES ═════════════════════════════════════════════════ */
    #choices {
      flex-shrink: 0;
      padding: 14px 20px calc(var(--safe-bottom) + 20px);
      min-height: 80px;
      display: flex; flex-direction: column; gap: 9px;
      position: relative; z-index: 10;
      border-top: 0.5px solid rgba(255,255,255,0.05);
      background: linear-gradient(to top, rgba(5,5,16,0.96) 55%, transparent);
    }

    /* Bottom fade extending into dialogue */
    #choices::before {
      content: '';
      position: absolute;
      top: -64px; left: 0; right: 0; height: 64px;
      background: linear-gradient(to bottom, transparent, rgba(5,5,16,0.7));
      pointer-events: none;
    }

    /* Pulsing dot during auto-play */
    #choices.auto-play { cursor: pointer; }
    #choices.auto-play::after {
      content: '';
      position: absolute;
      bottom: calc(var(--safe-bottom) + 16px); right: 22px;
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,0.22);
      animation: pulse-dot 2.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50%       { opacity: 0.4;  transform: scale(1.4); }
    }

    .choice-btn {
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.13);
      border-radius: 13px;
      padding: 13px 18px;
      color: rgba(255,255,255,0.75);
      font-family: inherit; font-size: 14px;
      text-align: left; cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
      opacity: 0; transform: translateY(6px);
      animation: slide-in 0.35s ease forwards;
    }
    @keyframes slide-in { to { opacity: 1; transform: none; } }
    .choice-btn:nth-child(2) { animation-delay: 0.07s; }
    .choice-btn:nth-child(3) { animation-delay: 0.14s; }
    .choice-btn:hover  { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.22); }
    .choice-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.09); }

    .choice-btn.reset {
      border-color: rgba(74,158,255,0.22);
      color: rgba(74,158,255,0.55);
      text-align: center; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    }

    .choice-btn.main {
      color: #f5c842;
      border-color: rgba(245,200,66,0.35);
    }
    .choice-btn.main:hover {
      border-color: rgba(245,200,66,0.6);
      background: rgba(245,200,66,0.06);
    }

    .choice-btn.secondary {
      color: rgba(74,158,255,0.85);
      border-color: rgba(74,158,255,0.3);
    }
    .choice-btn.secondary:hover {
      border-color: rgba(74,158,255,0.55);
      background: rgba(74,158,255,0.06);
    }

    .choice-btn.action {
      color: rgba(255,80,80,0.9);
      border-color: rgba(255,80,80,0.35);
    }
    .choice-btn.action:hover {
      border-color: rgba(255,80,80,0.6);
      background: rgba(255,80,80,0.07);
    }

    @keyframes choice-confirm {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    .choice-btn.selected {
      animation: choice-confirm 0.35s ease forwards;
      opacity: 1 !important;
    }
    .choice-btn.selected.main {
      background: rgba(245,200,66,0.2);
      border-color: rgba(245,200,66,0.8);
    }
    .choice-btn.selected.secondary {
      background: rgba(74,158,255,0.2);
      border-color: rgba(74,158,255,0.7);
    }
    .choice-btn.selected.action {
      background: rgba(255,80,80,0.18);
      border-color: rgba(255,80,80,0.75);
    }
    .choice-btn.selected:not(.main):not(.secondary) {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
    }

    .choice-btn.dismissed {
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    /* Player reply */
    .msg-player {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .player-bubble {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.72);
      border-radius: 20px;
      padding: 13px 18px;
      max-width: 280px;
      font-size: 15px; line-height: 1.55;
      text-align: center;
    }

  </style>
</head>
<body>

  <div id="glitch-bar"></div>

  <!-- ══ LOADER ══ -->
  <div id="loader">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="hud tl">
      <div>STATION // EREBUS-7</div>
      <div>COORD 0.000N 0.000E</div>
      <div id="ld-date"></div>
    </div>
    <div class="hud tr">
      <div>CRYO-SYS v4.2.1</div>
      <div>PODS 001 / 128 ACTIFS</div>
      <div>TEMP −196°C → 37°C</div>
    </div>
    <div class="hud bl">
      <div>SIG ████████░░ 82%</div>
      <div>BATT ███████░░░ 71%</div>
    </div>
    <div class="hud br">
      <div>DURÉE 5555j 00:00</div>
      <div>LIA OS 0.9.1-BETA</div>
    </div>

    <div class="loader-body">
      <div class="loader-eyebrow">Système narratif</div>
      <div class="loader-wordmark" data-text="SUBTEXT" id="wordmark">SUBTEXT</div>
      <div class="loader-rule"></div>
      <div class="progress-track">
        <div class="progress-fill" id="ld-bar"></div>
      </div>
      <div class="loader-status-text" id="ld-status">INIT<span class="blink">_</span></div>
    </div>
  </div>

  <!-- ══ GAME ══ -->
  <div id="game">
    <canvas id="bg"></canvas>
    <canvas id="glitch-cv"></canvas>

    <!-- HUD bar -->
    <div id="hud-bar">
      <button id="back-btn" onclick="navigateBack()">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M7 1L3 5L7 9"/>
        </svg>
        Menu
      </button>
      <span id="hud-r">SCN_001</span>
    </div>

    <!-- Visual zone -->
    <div id="visual-zone">
      <div class="v-corner tl"></div>
      <div class="v-corner tr"></div>
      <div class="v-corner bl"></div>
      <div class="v-corner br"></div>
      <span id="scene-label">// VISUEL</span>
      <div id="visual-placeholder">
        <span class="ph-label">Scène à venir</span>
      </div>
    </div>

    <!-- Dialogue zone -->
    <div id="dialogue"></div>

    <!-- User zone -->
    <div id="choices"></div>
  </div>

  <script>
  // ── Navigation ───────────────────────────────────────────────
  function navigateBack() {
    document.body.style.transition = 'opacity 0.35s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = './index.html'; }, 350);
  }

  // ── Story ────────────────────────────────────────────────────
  const STORY = [
    { type: 'lia',
      text: 'Bonjour Slayer, vous venez de passer 5555 jours en suspension cryogénique.' },
    { type: 'lia',
      text: 'Comment vous sentez vous\u00a0?' },
    { type: 'narrator',
      text: 'Lia — une IA — vous réveille de votre sommeil dans une station spatiale abandonnée.' },
    { type: 'choice',
      options: [{ label: 'Hey, y a quelqu\'un ici\u00a0?', next: 4 }] },
    { type: 'narrator',
      text: 'Il semblerait que personne ne vous entend dans l\'espace.' },
    { type: 'choice',
      options: [{ label: 'Tu sais ce qu\'il se passe ici\u00a0?', next: 6 }] },
    { type: 'lia',
      text: 'Non, je suis comme toi. J\'ai l\'impression que j\'ai perdu ma mémoire vive. Quelqu\'un a décidément pris l\'initiative de me débrancher. Mais les senseurs du vaisseau m\'ont rallumé. Tu te trouvais là... Endormi dans le frigo. Et je t\'ai réveillé.' },
    { type: 'choice',
      options: [
        { label: 'C\'est normal que je ne me souvienne de rien\u00a0?',  variant: 'main',      next: 10 },
        { label: 'Le frigo\u00a0?',                                      variant: 'secondary', next: 8  }
      ] },
    { type: 'lia',
      text: 'C\'est comme ça qu\'on appelle la cuve carbonite. De fines particules d\'eau en lévitation combinés à une température extrèmement froide. Ce truc là peut congeler et limiter toute activité cérébrale. En général on y reste pas plus d\'une heure. Sauf si une personne mal attentionné modifie la date de décongélation à ta place.' },
    { type: 'choice',
      options: [
        { label: 'C\'est normal que je ne me souvienne de rien\u00a0?', variant: 'main', next: 10 }
      ] },
    { type: 'lia',
      text: 'La cryogénisation met un peu de temps avant que tu récupères tes souvenirs, ne t\'inquiète pas, ça va passer.' },
    { type: 'choice',
      options: [{ label: 'Tu m\'as réveillé\u00a0?', next: 12 }] },
    { type: 'lia',

  // ── Engine ───────────────────────────────────────────────────
  let step = 0;
  let gen  = 0;
  let autoTimer   = null;
  let beatStarted = false;
  let inAutoPlay  = false;
  let skipTyping  = false;

  const $dialogue = document.getElementById('dialogue');
  const $choices  = document.getElementById('choices');

  // ── Character tracking ───────────────────────────────────────
  const CHARACTER_NAMES = ['Lia', 'Slayer'];
  const introducedChars = new Set();

  function checkIntroductions(text) {
    for (const name of CHARACTER_NAMES) {
      if (new RegExp('\\b' + name + '\\b', 'i').test(text)) {
        introducedChars.add(name.toLowerCase());
      }
    }
  }

  function boldNames(text) {
    let result = text;
    for (const name of CHARACTER_NAMES) {
      result = result.replace(new RegExp('\\b(' + name + ')\\b', 'g'), '<strong>$1</strong>');
    }
    return result;
  }

  function parseText(text) {
    const result = [];
    let pos = 0;
    while (pos < text.length) {
      let matched = false;
      for (const name of CHARACTER_NAMES) {
        const m = text.slice(pos).match(new RegExp('^' + name + '\\b', 'i'));
        if (m) {
          for (const ch of m[0]) result.push({ char: ch, bold: true });
          pos += m[0].length;
          matched = true;
          break;
        }
      }
      if (!matched) {
        result.push({ char: text[pos], bold: false });
        pos++;
      }
    }
    return result;
  }

  function saveGame() {
    localStorage.setItem('subtext_save', JSON.stringify({
      step,
      introducedChars: [...introducedChars]
    }));
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function tick()    { return new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))); }

  function smartScroll() {
    const lastMsg = $dialogue.lastElementChild;
    if (!lastMsg) return;
    const refBottom  = lastMsg.getBoundingClientRect().bottom;
    const threshold  = $choices.getBoundingClientRect().top - 80;
    if (refBottom > threshold) $dialogue.scrollTop += refBottom - threshold;
  }

  // Ghost-char typing: words in inline-block spans — no mid-word line breaks.
  async function typeText(el, text, myGen, speed = 22) {
    const parsedChars = parseText(text);
    const charSpans = [];

    let i = 0;
    while (i < parsedChars.length) {
      const c = parsedChars[i];
      if (c.char === ' ') {
        const s = document.createElement('span');
        s.textContent = ' ';
        s.style.opacity = '0';
        el.appendChild(s);
        charSpans.push(s);
        i++;
      } else {
        const wordEl = document.createElement('span');
        wordEl.style.cssText = 'display:inline-block;white-space:nowrap;';
        while (i < parsedChars.length && parsedChars[i].char !== ' ') {
          const wc = parsedChars[i];
          const s = document.createElement('span');
          s.textContent = wc.char;
          s.style.opacity = '0';
          if (wc.bold) s.style.fontWeight = '700';
          wordEl.appendChild(s);
          charSpans.push(s);
          i++;
        }
        el.appendChild(wordEl);
      }
    }

    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    if (el.firstChild) el.insertBefore(cursor, el.firstChild);
    else el.appendChild(cursor);

    for (let j = 0; j < charSpans.length; j++) {
      if (gen !== myGen) {
        for (let k = j; k < charSpans.length; k++) charSpans[k].style.opacity = '1';
        cursor.remove();
        smartScroll();
        return;
      }
      if (skipTyping) {
        skipTyping = false;
        for (let k = j; k < charSpans.length; k++) charSpans[k].style.opacity = '1';
        cursor.remove();
        smartScroll();
        return;
      }
      charSpans[j].style.opacity = '1';
      charSpans[j].insertAdjacentElement('afterend', cursor);
      if (j % 4 === 0) smartScroll();
      await sleep(speed + Math.random() * 8);
    }

    cursor.remove();
    smartScroll();
  }

  async function renderBeat(beat) {
    beatStarted = false;
    const myGen = gen;
    $choices.innerHTML = '';

    if (beat.type === 'choice') {
      inAutoPlay = false;
      $choices.classList.remove('auto-play');
      showChoices(beat.options);
      return;
    }

    checkIntroductions(beat.text);

    inAutoPlay = true;
    $choices.classList.add('auto-play');
    $dialogue.querySelectorAll('.msg').forEach(m => m.classList.add('dim'));

    let msgEl, textEl;

    if (beat.type === 'narrator') {
      msgEl = document.createElement('div');
      msgEl.className = 'msg msg-narrator';
      msgEl.innerHTML = boldNames(beat.text);
      $dialogue.appendChild(msgEl);
      beatStarted = true;
      await tick();
      if (gen !== myGen) return;
      msgEl.classList.add('in');
      smartScroll();
      await sleep(500);
      if (gen !== myGen) return;
      autoTimer = setTimeout(() => {
        if (gen !== myGen) return;
        inAutoPlay = false;
        $choices.classList.remove('auto-play');
        step++;
        runStep();
      }, 320);
      return;
    }

    // lia
    msgEl = document.createElement('div');
    msgEl.className = 'msg msg-lia';
    if (introducedChars.has('lia')) {
      const label = document.createElement('div');
      label.className = 'lia-label'; label.textContent = 'LIA';
      msgEl.appendChild(label);
    }
    textEl = document.createElement('div');
    textEl.className = 'lia-bubble';
    msgEl.appendChild(textEl);

    msgEl.style.visibility = 'hidden';
    textEl.innerHTML = boldNames(beat.text);
    $dialogue.appendChild(msgEl);
    beatStarted = true;
    await tick();
    if (gen !== myGen) return;
    const finalH = textEl.scrollHeight;
    textEl.innerHTML = '';
    textEl.style.minHeight = finalH + 'px';
    msgEl.style.visibility = '';
    msgEl.classList.add('in');
    smartScroll();

    await sleep(160);
    if (gen !== myGen) {
      textEl.innerHTML = boldNames(beat.text);
      textEl.style.minHeight = '';
      return;
    }

    await typeText(textEl, beat.text, myGen, 22);
    if (gen !== myGen) return;

    autoTimer = setTimeout(() => {
      if (gen !== myGen) return;
      inAutoPlay = false;
      $choices.classList.remove('auto-play');
      step++;
      runStep();
    }, 320);
  }

  function skipToChoice() {
    if (!inAutoPlay && !beatStarted) return;
    gen++;
    clearTimeout(autoTimer);
    inAutoPlay = false;
    $choices.classList.remove('auto-play');
    $choices.innerHTML = '';

    $dialogue.querySelectorAll('.msg').forEach(m => {
      m.style.transition = 'none';
      m.classList.add('dim');
    });

    let s = beatStarted ? step + 1 : step;
    while (s < STORY.length && STORY[s].type !== 'choice') {
      renderInstant(STORY[s]);
      s++;
    }
    step = s;

    requestAnimationFrame(() => {
      const msgs = $dialogue.querySelectorAll('.msg');
      if (msgs.length) msgs[msgs.length - 1].classList.remove('dim');
      $dialogue.querySelectorAll('.msg').forEach(m => { m.style.transition = ''; });
      if (step < STORY.length) runStep();
    });
  }

  function renderInstant(beat) {
    checkIntroductions(beat.text);
    let msgEl;
    if (beat.type === 'narrator') {
      msgEl = document.createElement('div');
      msgEl.className = 'msg msg-narrator in dim';
      msgEl.style.transition = 'none';
      msgEl.innerHTML = boldNames(beat.text);
    } else {
      msgEl = document.createElement('div');
      msgEl.className = 'msg msg-lia in dim';
      msgEl.style.transition = 'none';
      if (introducedChars.has('lia')) {
        const label = document.createElement('div');
        label.className = 'lia-label'; label.textContent = 'LIA';
        msgEl.appendChild(label);
      }
      const bubble = document.createElement('div');
      bubble.className = 'lia-bubble';
      bubble.innerHTML = boldNames(beat.text);
      msgEl.appendChild(bubble);
    }
    $dialogue.appendChild(msgEl);
    $dialogue.scrollTop = $dialogue.scrollHeight;
  }

  function addPlayerMessage(text) {
    $dialogue.querySelectorAll('.msg').forEach(m => m.classList.add('dim'));
    const msgEl = document.createElement('div');
    msgEl.className = 'msg msg-player';
    const bubble = document.createElement('div');
    bubble.className = 'player-bubble';
    bubble.textContent = text;
    msgEl.appendChild(bubble);
    $dialogue.appendChild(msgEl);
    requestAnimationFrame(() => {
      msgEl.classList.add('in');
      smartScroll();
    });
  }

  function showChoices(options) {
    inAutoPlay = false;
    $choices.classList.remove('auto-play');
    $choices.innerHTML = '';
    const msgs = $dialogue.querySelectorAll('.msg');
    if (msgs.length) msgs[msgs.length - 1].classList.remove('dim');
    saveGame();
    options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn'
        + (opt.reset ? ' reset' : '')
        + (opt.variant === 'main' ? ' main' : '')
        + (opt.variant === 'secondary' ? ' secondary' : '')
        + (opt.variant === 'action' ? ' action' : '');
      btn.textContent = opt.label;
      btn.style.animationDelay = (i * 0.07) + 's';
      btn.addEventListener('click', () => {
        if (opt.reset) { resetGame(); return; }
        const allBtns = $choices.querySelectorAll('.choice-btn');
        allBtns.forEach(b => {
          if (b === btn) b.classList.add('selected');
          else b.classList.add('dismissed');
        });
        setTimeout(() => {
          $choices.innerHTML = '';
          addPlayerMessage(opt.label);
          setTimeout(() => { step = opt.next; runStep(); }, 350);
        }, 420);
      });
      $choices.appendChild(btn);
    });
  }

  function runStep() {
    if (step >= STORY.length) return;
    renderBeat(STORY[step]);
  }

  function resetGame() {
    gen++;
    clearTimeout(autoTimer);
    inAutoPlay = false;
    $choices.classList.remove('auto-play');
    step = 0;
    introducedChars.clear();
    localStorage.removeItem('subtext_save');
    $dialogue.innerHTML = '';
    $choices.innerHTML = '';
    runStep();
  }

  $choices.addEventListener('click', (e) => {
    if (!e.target.classList.contains('choice-btn')) skipToChoice();
  });

  $dialogue.addEventListener('click', () => {
    if (inAutoPlay) skipTyping = true;
  });

  // ── Background: nebula + drifting stars ──────────────────────
  (function() {
    const cv = document.getElementById('bg');
    const cx = cv.getContext('2d');
    let W, H, stars, nebulas;

    function resize() {
      W = cv.width = window.innerWidth;
      H = cv.height = window.innerHeight;
    }

    function init() {
      resize();
      nebulas = [
        { bx: W*0.18, by: H*0.3,  r: 300, rgb:'55,90,210',  a:0.032, sx:0.00025, sy:0.00018 },
        { bx: W*0.78, by: H*0.65, r: 260, rgb:'90,45,185',  a:0.022, sx:0.00018, sy:0.00030 },
        { bx: W*0.50, by: H*0.08, r: 220, rgb:'0,140,150',  a:0.020, sx:0.00032, sy:0.00022 },
        { bx: W*0.85, by: H*0.2,  r: 180, rgb:'40,80,180',  a:0.015, sx:0.00020, sy:0.00015 }
      ];
      stars = Array.from({ length: 90 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.06,
        vy: Math.random() * 0.04 + 0.01,
        r: Math.random() * 0.85 + 0.1,
        a: Math.random() * 0.22 + 0.04,
        sp: Math.random() * 0.002 + 0.001,
        ph: Math.random() * Math.PI * 2
      }));
    }

    function draw(t) {
      cx.clearRect(0, 0, W, H);
      for (const n of nebulas) {
        const ox = n.bx + Math.sin(t * n.sx) * 70;
        const oy = n.by + Math.cos(t * n.sy) * 50;
        const g = cx.createRadialGradient(ox, oy, 0, ox, oy, n.r);
        g.addColorStop(0, `rgba(${n.rgb},${n.a})`);
        g.addColorStop(0.5, `rgba(${n.rgb},${n.a * 0.4})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        cx.fillStyle = g;
        cx.beginPath();
        cx.ellipse(ox, oy, n.r, n.r * 0.75, 0, 0, Math.PI * 2);
        cx.fill();
      }
      for (const s of stars) {
        s.x += s.vx; s.y -= s.vy;
        if (s.y < -2) { s.y = H + 2; s.x = Math.random() * W; }
        if (s.x < -2) s.x = W + 2;
        if (s.x > W + 2) s.x = -2;
        const a = s.a * (0.6 + 0.4 * Math.sin(t * s.sp * 1000 + s.ph));
        cx.fillStyle = `rgba(200,220,255,${a})`;
        cx.fillRect(s.x, s.y, s.r, s.r);
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('load', () => { init(); requestAnimationFrame(draw); });
    window.addEventListener('resize', () => { resize(); nebulas = null; init(); });
  })();

  // ── Background glitch canvas ────────────────────────────────
  (function () {
    const cv = document.getElementById('glitch-cv');
    const cx = cv.getContext('2d');
    let W, H;

    const CLR = { cyan: [0,210,255], mag: [255,30,110], amber: [255,175,30] };
    function pick(...keys) { return CLR[keys[Math.floor(Math.random() * keys.length)]]; }

    // ── Dot matrix (DedSec) — off-screen static canvas ──────
    let dotCanvas = null;
    function buildDots() {
      dotCanvas = document.createElement('canvas');
      dotCanvas.width = W; dotCanvas.height = H;
      const dc = dotCanvas.getContext('2d');
      dc.fillStyle = 'rgba(0,210,255,0.048)';
      const sp = 28;
      for (let x = sp / 2; x < W; x += sp)
        for (let y = sp / 2; y < H; y += sp)
          dc.fillRect(x, y, 1.5, 1.5);
    }

    function resize() {
      W = cv.width  = window.innerWidth;
      H = cv.height = window.innerHeight;
      buildDots();
    }

    // ── Wireframe rectangles + brackets ─────────────────────
    const rects = [];
    function spawnRect() {
      const w = 55 + Math.random() * 120, h = 40 + Math.random() * 80;
      rects.push({
        x: Math.random() * (W - w), y: Math.random() * (H - h), w, h,
        color: pick('cyan', 'mag'),
        life: 0, max: 80 + Math.floor(Math.random() * 100)
      });
    }

    // ── Circuit traces ───────────────────────────────────────
    const traces = [];
    function spawnTrace() {
      const color = pick('cyan', 'amber');
      let x = Math.random() < 0.5 ? 0 : W;
      let y = 40 + Math.random() * (H - 80);
      const pts = [{ x, y }];
      const n = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) {
        if (i % 2 === 0) x = Math.max(10, Math.min(W - 10, x + (x < W / 2 ? 1 : -1) * (70 + Math.random() * 110)));
        else             y = Math.max(10, Math.min(H - 10, y + (Math.random() < 0.5 ? 1 : -1) * (30 + Math.random() * 70)));
        pts.push({ x, y });
      }
      let len = 0;
      for (let i = 1; i < pts.length; i++)
        len += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
      traces.push({ pts, color, len, life: 0, max: 100 + Math.floor(Math.random() * 70), alpha: 0.2 + Math.random() * 0.12 });
    }

    // ── Color blocks ─────────────────────────────────────────
    const blocks = [];
    function spawnBlock() {
      const w = 30 + Math.random() * 90, h = 14 + Math.random() * 48;
      blocks.push({
        x: Math.random() * (W - w), y: Math.random() * (H - h), w, h,
        color: pick('cyan', 'mag'),
        life: 0, max: 10 + Math.floor(Math.random() * 14)
      });
    }

    // ── Scan burst ───────────────────────────────────────────
    let scanBurst = 0;

    // ── Scheduler ────────────────────────────────────────────
    let f = 0, nR = 90, nT = 50, nB = 65, nS = 200;
    function schedule() {
      f++;
      if (f > nR) { spawnRect();  nR = f + 130 + Math.floor(Math.random() * 190); }
      if (f > nT) { spawnTrace(); nT = f + 90  + Math.floor(Math.random() * 130); }
      if (f > nB) { spawnBlock(); nB = f + 65  + Math.floor(Math.random() * 110); }
    }

    // ── Draw ─────────────────────────────────────────────────
    function draw() {
      schedule();
      cx.clearRect(0, 0, W, H);

      // 1. Dot matrix
      if (dotCanvas) cx.drawImage(dotCanvas, 0, 0);

      // 2. Persistent scan lines
      cx.fillStyle = 'rgba(0,0,0,0.15)';
      for (let y = 2; y < H; y += 4) cx.fillRect(0, y, W, 2);

      // 3. Color blocks
      for (let i = blocks.length - 1; i >= 0; i--) {
        const b = blocks[i]; b.life++;
        const t = b.life / b.max;
        const a = 0.09 * (t < 0.2 ? t / 0.2 : t > 0.8 ? (1 - t) / 0.2 : 1);
        cx.globalAlpha = a;
        cx.fillStyle = `rgb(${b.color.join(',')})`;
        cx.fillRect(b.x, b.y, b.w, b.h);
        cx.globalAlpha = 1;
        if (b.life >= b.max) blocks.splice(i, 1);
      }

      // 5. Wireframe rects + corner brackets
      for (let i = rects.length - 1; i >= 0; i--) {
        const r = rects[i]; r.life++;
        const t  = r.life / r.max;
        const fa = t < 0.12 ? t / 0.12 : t > 0.78 ? (1 - t) / 0.22 : 1;
        cx.strokeStyle = `rgb(${r.color.join(',')})`;
        cx.lineWidth   = 0.5;
        cx.globalAlpha = fa * 0.22;
        cx.strokeRect(r.x, r.y, r.w, r.h);
        const bl = 9;
        cx.lineWidth   = 1;
        cx.globalAlpha = fa * 0.38;
        for (const [bx, by, sx, sy] of [
          [r.x,       r.y,        1,  1],
          [r.x + r.w, r.y,       -1,  1],
          [r.x,       r.y + r.h,  1, -1],
          [r.x + r.w, r.y + r.h, -1, -1]
        ]) {
          cx.beginPath();
          cx.moveTo(bx + sx * bl, by); cx.lineTo(bx, by); cx.lineTo(bx, by + sy * bl);
          cx.stroke();
        }
        cx.globalAlpha = 1;
        if (r.life >= r.max) rects.splice(i, 1);
      }

      // 6. Circuit traces with animated head
      for (let i = traces.length - 1; i >= 0; i--) {
        const tr = traces[i]; tr.life++;
        const t  = tr.life / tr.max;
        const fa = (t < 0.08 ? t / 0.08 : t > 0.82 ? (1 - t) / 0.18 : 1) * tr.alpha;
        const drawLen = tr.len * Math.min(t / 0.55, 1);
        cx.globalAlpha = fa;
        cx.strokeStyle = `rgb(${tr.color.join(',')})`;
        cx.lineWidth   = 0.8;
        cx.beginPath();
        let rem = drawLen, hx = tr.pts[0].x, hy = tr.pts[0].y;
        cx.moveTo(hx, hy);
        for (let j = 1; j < tr.pts.length; j++) {
          if (rem <= 0) break;
          const sl = Math.hypot(tr.pts[j].x - tr.pts[j-1].x, tr.pts[j].y - tr.pts[j-1].y);
          if (rem >= sl) {
            cx.lineTo(tr.pts[j].x, tr.pts[j].y);
            hx = tr.pts[j].x; hy = tr.pts[j].y; rem -= sl;
          } else {
            const frac = rem / sl;
            hx = tr.pts[j-1].x + (tr.pts[j].x - tr.pts[j-1].x) * frac;
            hy = tr.pts[j-1].y + (tr.pts[j].y - tr.pts[j-1].y) * frac;
            cx.lineTo(hx, hy); rem = 0;
          }
        }
        cx.stroke();
        if (t < 0.55) {
          cx.globalAlpha = Math.min(fa * 2.2, 0.55);
          cx.fillStyle   = `rgb(${tr.color.join(',')})`;
          cx.fillRect(hx - 2, hy - 2, 4, 4);
        }
        cx.globalAlpha = 1;
        if (tr.life >= tr.max) traces.splice(i, 1);
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('load', () => { resize(); requestAnimationFrame(draw); });
    window.addEventListener('resize', resize);
  })();

  // ── Glitch helpers ───────────────────────────────────────────
  const wordmark   = document.getElementById('wordmark');
  const glitchBar  = document.getElementById('glitch-bar');
  const loader     = document.getElementById('loader');

  function flashGlitch() {
    wordmark.classList.add('glitching');
    setTimeout(() => wordmark.classList.remove('glitching'), 260);
    const barY = Math.random() * 80 + 10;
    glitchBar.style.top = barY + '%';
    glitchBar.style.opacity = '1';
    glitchBar.style.transform = `scaleX(${0.3 + Math.random() * 0.7})`;
    glitchBar.style.transformOrigin = Math.random() > 0.5 ? 'left' : 'right';
    setTimeout(() => {
      glitchBar.style.opacity = '0';
      setTimeout(() => {
        glitchBar.style.top = (Math.random() * 60 + 20) + '%';
        glitchBar.style.opacity = '0.5';
        setTimeout(() => { glitchBar.style.opacity = '0'; }, 40);
      }, 60);
    }, 50);
    loader.style.filter = 'brightness(1.4)';
    setTimeout(() => { loader.style.filter = ''; }, 80);
  }

  // ── Loader sequence ──────────────────────────────────────────
  (function() {
    const bar    = document.getElementById('ld-bar');
    const status = document.getElementById('ld-status');
    const dateEl = document.getElementById('ld-date');

    dateEl.textContent = new Date().toISOString().slice(0, 10).replace(/-/g, '.');

    const steps = [
      'INIT SYSTÈMES CRYO',
      'DÉTECTION SIGNES VITAUX',
      'PROTOCOLE RÉVEIL',
      'SYNC LIA OS',
      'CHARGEMENT DONNÉES',
      'PRÊT'
    ];
    let si = 0, progress = 0;

    const sti = setInterval(() => {
      si = Math.min(si + 1, steps.length - 1);
      status.innerHTML = steps[si] + '<span class="blink">_</span>';
    }, 520);

    const pi = setInterval(() => {
      progress += Math.random() * 5 + 1.5;
      if (progress >= 100) {
        progress = 100;
        clearInterval(pi); clearInterval(sti);
        status.innerHTML = 'PRÊT<span class="blink">_</span>';
      }
      bar.style.width = progress + '%';
    }, 75);

    [700, 1550, 2700].forEach(t => setTimeout(flashGlitch, t));

    setTimeout(() => {
      flashGlitch();
      setTimeout(flashGlitch, 120);
      setTimeout(() => {
        loader.classList.add('fade-out');
        document.getElementById('game').classList.add('on');
        setTimeout(() => {
          loader.style.display = 'none';
          const mode = new URLSearchParams(window.location.search).get('mode');
          if (mode === 'new') {
            localStorage.removeItem('subtext_save');
            runStep();
          } else {
            const saved = localStorage.getItem('subtext_save');
            if (saved) {
              try {
                const sv = JSON.parse(saved);
                step = sv.step || 0;
                (sv.introducedChars || []).forEach(c => introducedChars.add(c));
                for (let s = 0; s < step; s++) {
                  if (STORY[s].type !== 'choice') renderInstant(STORY[s]);
                }
                const ms = $dialogue.querySelectorAll('.msg');
                if (ms.length) ms[ms.length - 1].classList.remove('dim');
                $dialogue.scrollTop = $dialogue.scrollHeight;
              } catch(e) { step = 0; }
            }
            runStep();
          }
        }, 900);
      }, 200);
    }, 3500);
  })();
  </script>
</body>
