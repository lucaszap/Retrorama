<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THEY'RE WATCHING</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060608;
    --red: #FF1F1F;
    --white: #F0EDE8;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--white);
    font-family: 'Arial Black', 'Arial', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 14px;
  }

  /* Corner brackets */
  .corner { position: absolute; width: 28px; height: 28px; border-color: rgba(255,31,31,0.4); border-style: solid; }
  .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* Scan sweep */
  .scan-sweep {
    position: fixed;
    top: -4px; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(to bottom, transparent, rgba(255,31,31,0.6), transparent);
    animation: sweep 5s linear infinite;
    pointer-events: none;
    z-index: 100;
  }
  @keyframes sweep {
    0% { transform: translateY(0); }
    100% { transform: translateY(100vh); }
  }

  /* Eyebrow */
  .eyebrow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--white);
    opacity: 0.7;
    margin-bottom: 10px;
    z-index: 2;
  }
  .eyebrow .right { color: var(--red); }

  /* Headline zone */
  .headline-zone {
    position: relative;
    margin-bottom: 4px;
  }
  .headline-bg {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 38%;
    height: 200px;
    background: var(--red);
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 6px,
      rgba(240,237,232,0.12) 6px,
      rgba(240,237,232,0.12) 7px
    );
    z-index: 0;
  }
  .they {
    position: relative;
    z-index: 2;
    font-size: clamp(60px, 20vw, 82px);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -2px;
    text-transform: uppercase;
    color: var(--white);
  }
  .they::before, .they::after {
    content: 'THEY\'RE';
    position: absolute;
    left: 0; top: 0;
    font-size: inherit;
    font-weight: inherit;
    line-height: inherit;
    letter-spacing: inherit;
    animation: glitch 4s steps(1) infinite;
  }
  .they::before {
    color: var(--red);
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    transform: translateX(-3px);
    animation-delay: 0s;
  }
  .they::after {
    color: #00FFFF;
    clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    transform: translateX(3px);
    animation-delay: 2s;
  }
  @keyframes glitch {
    0%, 90%, 100% { opacity: 0; transform: translateX(0); }
    91% { opacity: 1; transform: translateX(-4px); }
    93% { opacity: 1; transform: translateX(3px); }
    95% { opacity: 0; }
  }
  .always-italic {
    position: absolute;
    top: 18px; left: 12px;
    font-size: clamp(50px, 16vw, 68px);
    font-weight: 900;
    font-style: italic;
    color: var(--white);
    opacity: 0.18;
    pointer-events: none;
    z-index: 1;
    letter-spacing: -1px;
  }
  .always-line, .watching-line {
    font-size: clamp(55px, 18vw, 75px);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -2px;
    color: var(--white);
    position: relative;
    z-index: 2;
  }

  /* Divider zone */
  .divider-zone {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
    z-index: 2;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(240,237,232,0.25); }
  .cam-info {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    color: var(--red);
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }
  .crosshair {
    animation: rotate 8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  /* Bottom section */
  .bottom-section {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
    margin-top: auto;
    z-index: 2;
  }
  .watch-out {
    font-size: clamp(32px, 11vw, 46px);
    font-weight: 900;
    color: var(--white);
    line-height: 1;
  }
  .monitor-box {
    position: relative;
    border: 1px solid rgba(255,31,31,0.5);
    padding: 6px 8px;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    color: var(--red);
    letter-spacing: 0.08em;
    overflow: hidden;
    min-width: 140px;
  }
  .monitor-box .label { color: var(--white); opacity: 0.6; margin-bottom: 4px; }
  .scan-bar {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 2px;
    background: var(--red);
    animation: scanbar 1.8s ease-in-out infinite;
    opacity: 0.7;
  }
  @keyframes scanbar {
    0% { transform: translateY(0); }
    100% { transform: translateY(36px); }
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    color: var(--white);
    opacity: 0.5;
    margin-top: 8px;
    z-index: 2;
    letter-spacing: 0.1em;
  }
  .rec-blink { color: var(--red); opacity: 1; animation: blink 1.2s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Cross markers */
  .cross {
    position: absolute;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--red);
    opacity: 0;
    pointer-events: none;
    animation: crossblink var(--dur, 3s) var(--del, 0s) step-end infinite;
    z-index: 3;
  }
  @keyframes crossblink { 20%, 25% { opacity: 0.6; } }
</style>
</head>
<body>
<div class="page">
  <div class="scan-sweep"></div>

  <!-- Corner brackets -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Cross markers -->
  <div class="cross" style="top:22%;left:72%;--dur:2.7s;--del:0.4s;">+</div>
  <div class="cross" style="top:48%;left:14%;--dur:3.5s;--del:1.1s;">+</div>
  <div class="cross" style="top:65%;left:82%;--dur:2.2s;--del:0.7s;">+</div>
  <div class="cross" style="top:78%;left:44%;--dur:4s;--del:1.8s;">+</div>
  <div class="cross" style="top:33%;left:88%;--dur:3.1s;--del:0.2s;">+</div>

  <!-- Eyebrow -->
  <div class="eyebrow">
    <span>30.5.2026 · SYS:ONLINE</span>
    <span class="right">THEY'RE WATCHING +</span>
  </div>

  <!-- Headline -->
  <div class="headline-zone">
    <div class="headline-bg"></div>
    <div class="always-italic">Always</div>
    <div class="they">THEY'RE</div>
  </div>
  <div class="always-line">ALWAYS</div>
  <div class="watching-line">WATCHING</div>

  <!-- Divider -->
  <div class="divider-zone">
    <div class="cam-info">CAM_001 · ACTIVE · <span id="clock">--:--:--</span></div>
    <div class="divider-line"></div>
    <svg class="crosshair" width="28" height="28" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="11" fill="none" stroke="#FF1F1F" stroke-width="1.2" opacity="0.7"/>
      <line x1="14" y1="0" x2="14" y2="6" stroke="#FF1F1F" stroke-width="1.2" opacity="0.7"/>
      <line x1="14" y1="22" x2="14" y2="28" stroke="#FF1F1F" stroke-width="1.2" opacity="0.7"/>
      <line x1="0" y1="14" x2="6" y2="14" stroke="#FF1F1F" stroke-width="1.2" opacity="0.7"/>
      <line x1="22" y1="14" x2="28" y2="14" stroke="#FF1F1F" stroke-width="1.2" opacity="0.7"/>
      <circle cx="14" cy="14" r="2" fill="#FF1F1F" opacity="0.9"/>
    </svg>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="watch-out">WATCH<br>OUT!</div>
    <div class="monitor-box">
      <div class="scan-bar"></div>
      <div class="label">ALGORITHM MONITOR</div>
      <div>TS26 · SECTOR 7</div>
      <div>STATUS: TRACKING</div>
      <div>NODES: 4,481 ACTIVE</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>GEN Z · FORM</span>
    <span class="rec-blink">■ REC</span>
    <span>365 DAYS</span>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
