<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xample Gfx. / ROBO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #FFD700;
    --black: #0A0A0A;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--gold);
    color: var(--black);
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 16px 14px 12px;
  }

  /* Registration marks */
  .reg {
    position: absolute;
    width: 20px; height: 20px;
    pointer-events: none;
    z-index: 10;
  }
  .reg.tl { top: 6px; left: 6px; }
  .reg.tr { top: 6px; right: 6px; }
  .reg.bl { bottom: 6px; left: 6px; }
  .reg.br { bottom: 6px; right: 6px; }

  /* Top section */
  .top-section {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    z-index: 2;
    margin-bottom: 6px;
  }
  .xample-block { display: flex; align-items: baseline; gap: 2px; }
  .xample-text {
    font-size: clamp(44px, 15vw, 62px);
    font-weight: 700;
    font-style: italic;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--black);
  }
  .gfx-text {
    font-size: clamp(22px, 7vw, 30px);
    font-weight: 400;
    font-style: italic;
    color: var(--black);
    opacity: 0.7;
  }
  .meta-block {
    font-family: 'Courier New', monospace;
    font-size: 7.5px;
    line-height: 1.7;
    letter-spacing: 0.06em;
    color: var(--black);
    opacity: 0.55;
    text-align: right;
    flex-shrink: 0;
    margin-top: 8px;
  }

  /* Divider */
  .divider { height: 1px; background: var(--black); opacity: 0.5; margin: 4px 0; z-index: 2; }

  /* Blueprint section */
  .blueprint {
    position: relative;
    flex: 0 0 auto;
    z-index: 2;
    margin-bottom: 4px;
  }
  .blueprint svg.grid-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* ROBO */
  .robo-word {
    font-family: 'Arial Black', 'Arial', sans-serif;
    font-size: clamp(70px, 24vw, 96px);
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--black);
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 10px 0 6px;
  }

  /* Bracket annotations */
  .bracket-zone {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2px;
  }
  .annot {
    font-family: 'Courier New', monospace;
    font-size: 7px;
    letter-spacing: 0.08em;
    color: var(--black);
    opacity: 0.45;
    flex-shrink: 0;
  }
  .bracket-svg { flex-shrink: 0; margin: 0 6px; }

  /* Variations row */
  .variations {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 4px;
    padding: 6px 4px;
    border-top: 1px solid rgba(10,10,10,0.3);
    border-bottom: 1px solid rgba(10,10,10,0.3);
    z-index: 2;
    margin-bottom: 4px;
    overflow: hidden;
  }
  .v-item { font-family: 'Arial Black', 'Arial', sans-serif; font-weight: 900; color: var(--black); line-height: 1; flex-shrink: 0; }

  /* Spec section */
  .spec-section { z-index: 2; margin-bottom: 6px; }
  .spec-title {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.6;
    margin-bottom: 4px;
    border-top: 1px solid rgba(10,10,10,0.25);
    padding-top: 4px;
  }
  .spec-lines {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 16px;
    font-family: 'Courier New', monospace;
    font-size: 7.5px;
    color: var(--black);
    opacity: 0.5;
    line-height: 1.6;
  }

  /* Bottom */
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    z-index: 2;
    padding-top: 4px;
    border-top: 1px solid rgba(10,10,10,0.25);
  }
  .design-brief {
    font-family: 'Courier New', monospace;
    font-size: 7.5px;
    letter-spacing: 0.12em;
    color: var(--black);
    opacity: 0.5;
  }
  .baseline-label {
    font-family: 'Courier New', monospace;
    font-size: 7.5px;
    letter-spacing: 0.12em;
    color: var(--black);
    opacity: 0.5;
  }

  /* SVG path draw-on animation */
  .draw-line {
    stroke-dasharray: var(--len, 300);
    stroke-dashoffset: var(--len, 300);
    animation: draw var(--dur, 1.5s) ease var(--del, 0s) forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* Corner bracket gold markers */
  .gold-mark {
    position: absolute;
    width: 14px; height: 14px;
    pointer-events: none;
    z-index: 11;
  }
  .gold-mark.tl { top: 4px; left: 4px; }
  .gold-mark.tr { top: 4px; right: 4px; }
  .gold-mark.bl { bottom: 4px; left: 4px; }
  .gold-mark.br { bottom: 4px; right: 4px; }
</style>
</head>
<body>
<div class="page">

  <!-- Registration marks -->
  <svg class="reg tl" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="6" fill="none" stroke="rgba(10,10,10,0.55)" stroke-width="0.8"/>
    <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
    <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
  </svg>
  <svg class="reg tr" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="6" fill="none" stroke="rgba(10,10,10,0.55)" stroke-width="0.8"/>
    <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
    <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
  </svg>
  <svg class="reg bl" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="6" fill="none" stroke="rgba(10,10,10,0.55)" stroke-width="0.8"/>
    <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
    <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
  </svg>
  <svg class="reg br" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="6" fill="none" stroke="rgba(10,10,10,0.55)" stroke-width="0.8"/>
    <line x1="10" y1="0" x2="10" y2="20" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
    <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(10,10,10,0.55)" stroke-width="0.7"/>
  </svg>

  <!-- Gold corner cut markers -->
  <svg class="gold-mark tl" viewBox="0 0 14 14"><line x1="0" y1="7" x2="14" y2="7" stroke="#B8860B" stroke-width="1"/><line x1="7" y1="0" x2="7" y2="14" stroke="#B8860B" stroke-width="1"/></svg>
  <svg class="gold-mark tr" viewBox="0 0 14 14"><line x1="0" y1="7" x2="14" y2="7" stroke="#B8860B" stroke-width="1"/><line x1="7" y1="0" x2="7" y2="14" stroke="#B8860B" stroke-width="1"/></svg>
  <svg class="gold-mark bl" viewBox="0 0 14 14"><line x1="0" y1="7" x2="14" y2="7" stroke="#B8860B" stroke-width="1"/><line x1="7" y1="0" x2="7" y2="14" stroke="#B8860B" stroke-width="1"/></svg>
  <svg class="gold-mark br" viewBox="0 0 14 14"><line x1="0" y1="7" x2="14" y2="7" stroke="#B8860B" stroke-width="1"/><line x1="7" y1="0" x2="7" y2="14" stroke="#B8860B" stroke-width="1"/></svg>

  <!-- Top -->
  <div class="top-section">
    <div class="xample-block">
      <span class="xample-text">Xample</span>
      <span class="gfx-text">Gfx.</span>
    </div>
    <div class="meta-block">
      TYPENAME SETTING PRINT<br>
      edit / [logo details]<br>
      VER 2.4 · 2026
    </div>
  </div>
  <div class="divider"></div>

  <!-- Blueprint zone with ROBO -->
  <div class="blueprint">
    <!-- Grid lines SVG -->
    <svg class="grid-lines" id="gridSvg" width="100%" height="130" viewBox="0 0 360 130" preserveAspectRatio="none">
      <!-- Horizontal dashed -->
      <line class="draw-line" x1="0" y1="20" x2="360" y2="20" stroke="rgba(10,10,10,0.15)" stroke-width="0.7" stroke-dasharray="4 4" style="--len:360;--dur:1.2s;--del:0.1s"/>
      <line class="draw-line" x1="0" y1="65" x2="360" y2="65" stroke="rgba(10,10,10,0.15)" stroke-width="0.7" stroke-dasharray="4 4" style="--len:360;--dur:1.2s;--del:0.3s"/>
      <line class="draw-line" x1="0" y1="110" x2="360" y2="110" stroke="rgba(10,10,10,0.15)" stroke-width="0.7" stroke-dasharray="4 4" style="--len:360;--dur:1.2s;--del:0.5s"/>
      <!-- Vertical dashed -->
      <line class="draw-line" x1="60" y1="0" x2="60" y2="130" stroke="rgba(10,10,10,0.12)" stroke-width="0.7" stroke-dasharray="4 4" style="--len:130;--dur:1s;--del:0.4s"/>
      <line class="draw-line" x1="180" y1="0" x2="180" y2="130" stroke="rgba(10,10,10,0.12)" stroke-width="0.7" stroke-dasharray="4 4" style="--len:130;--dur:1s;--del:0.6s"/>
      <line class="draw-line" x1="300" y1="0" x2="300" y2="130" stroke="rgba(10,10,10,0.12)" stroke-width="0.7" stroke-dasharray="4 4" style="--len:130;--dur:1s;--del:0.8s"/>
      <!-- Diagonals -->
      <line class="draw-line" x1="0" y1="0" x2="360" y2="130" stroke="rgba(10,10,10,0.07)" stroke-width="0.6" style="--len:390;--dur:1.6s;--del:0.9s"/>
      <line class="draw-line" x1="360" y1="0" x2="0" y2="130" stroke="rgba(10,10,10,0.07)" stroke-width="0.6" style="--len:390;--dur:1.6s;--del:1.1s"/>
    </svg>
    <div class="robo-word">ROBO</div>
  </div>

  <!-- Bracket annotations -->
  <div class="bracket-zone">
    <span class="annot">← width</span>
    <svg class="bracket-svg" width="120" height="16" viewBox="0 0 120 16">
      <!-- Arrow left -->
      <line class="draw-line" x1="4" y1="8" x2="56" y2="8" stroke="rgba(10,10,10,0.4)" stroke-width="0.8" style="--len:52;--dur:0.8s;--del:1.3s"/>
      <polyline points="8,4 2,8 8,12" fill="none" stroke="rgba(10,10,10,0.4)" stroke-width="0.8"/>
      <!-- Arrow right -->
      <line class="draw-line" x1="64" y1="8" x2="116" y2="8" stroke="rgba(10,10,10,0.4)" stroke-width="0.8" style="--len:52;--dur:0.8s;--del:1.5s"/>
      <polyline points="112,4 118,8 112,12" fill="none" stroke="rgba(10,10,10,0.4)" stroke-width="0.8"/>
      <!-- Baseline marker -->
      <line x1="0" y1="14" x2="120" y2="14" stroke="rgba(10,10,10,0.15)" stroke-width="0.6"/>
    </svg>
    <span class="annot">height →</span>
  </div>

  <div class="divider" style="margin:4px 0;"></div>

  <!-- Variations -->
  <div class="variations">
    <span class="v-item" style="font-size:34px;">R</span>
    <span class="v-item" style="font-size:22px;">ROBO</span>
    <span class="v-item" style="font-size:15px;font-weight:400;font-family:'Arial',sans-serif;">robo</span>
    <span class="v-item" style="font-size:28px;opacity:0.4;">ROBO</span>
    <span class="v-item" style="font-size:10px;letter-spacing:4px;">ROBO</span>
  </div>

  <!-- Spec section -->
  <div class="spec-section">
    <div class="spec-title">Detailed frame typefaces</div>
    <div class="spec-lines">
      <span>Weight: Black 900</span>
      <span>Tracking: −3px</span>
      <span>Baseline: grid-snapped</span>
      <span>Cap height: 88%</span>
      <span>Min size: 12px</span>
      <span>Clear space: 0.5× h</span>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="design-brief">DESIGN BRIEF · REV 01</div>
    <svg width="100" height="12" id="bottomLines">
      <line class="draw-line" x1="0" y1="6" x2="100" y2="6" stroke="rgba(10,10,10,0.35)" stroke-width="0.8" style="--len:100;--dur:1s;--del:1.8s"/>
      <line class="draw-line" x1="0" y1="2" x2="60" y2="2" stroke="rgba(10,10,10,0.2)" stroke-width="0.6" style="--len:60;--dur:0.8s;--del:2s"/>
      <line class="draw-line" x1="0" y1="10" x2="80" y2="10" stroke="rgba(10,10,10,0.2)" stroke-width="0.6" style="--len:80;--dur:0.9s;--del:2.2s"/>
    </svg>
    <div class="baseline-label">Baseline</div>
  </div>

</div>
</body>
</html>
