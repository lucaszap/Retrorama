<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INVENTAIRE — SLAYER</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1400FF;--bg:#0A0A0A}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif}

.layout{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.header-bar{width:100%;height:64px;background:var(--blue);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;transform:translateY(-100%);animation:slideDown .5s cubic-bezier(.4,0,.2,1) .1s forwards}
@keyframes slideDown{to{transform:translateY(0)}}
.header-title{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;font-family:'Arial Black',Arial,sans-serif}
.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hm-slots{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.65);font-family:'Courier New',monospace}
.hm-weight{font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,0.4);font-family:'Courier New',monospace}

.rule{width:100%;height:1px;background:#fff;flex-shrink:0;opacity:0;animation:fadeIn .4s ease .6s forwards}
@keyframes fadeIn{to{opacity:1}}

/* ── MAIN ── */
.main-area{flex:1;display:flex;overflow:hidden;min-height:0;opacity:0;animation:fadeIn .5s ease .8s forwards}
.content-left{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;padding-right:20%}

/* ── INVENTORY GRID ── */
.inv-zone{flex:0 0 52%;position:relative;overflow:hidden;background:#111115;border-bottom:1px solid rgba(255,255,255,0.1)}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:12px}
.slot{aspect-ratio:1;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;position:relative;transition:border-color .15s,background .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.slot:active{opacity:0.7}
.slot.filled{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.04)}
.slot.selected{border-color:var(--blue);background:rgba(20,0,255,0.1);box-shadow:0 0 0 1px rgba(20,0,255,0.4)}
.slot-icon{font-size:22px;line-height:1;user-select:none}
.slot-rarity{position:absolute;bottom:4px;right:5px;width:5px;height:5px;border-radius:50%}
.slot-qty{position:absolute;top:3px;left:5px;font-size:7px;font-family:'Courier New',monospace;color:rgba(255,255,255,0.35);letter-spacing:0.5px}

/* grid footer */
.inv-footer{position:absolute;bottom:0;left:0;right:0;padding:6px 12px;display:flex;justify-content:space-between;background:rgba(0,0,0,0.4);border-top:0.5px solid rgba(255,255,255,0.08)}
.if-label{font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.22);font-family:'Courier New',monospace;text-transform:uppercase}

/* ── DETAIL PANEL ── */
.detail-panel{flex:1;padding:12px 14px 10px;display:flex;flex-direction:column;gap:0;overflow:hidden;min-height:0}
.dp-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.item-name{font-size:clamp(22px,7vw,32px);font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;font-family:'Arial Black',Arial,sans-serif;flex:1;min-width:0}
.item-name.empty{color:rgba(255,255,255,0.18);font-size:20px}
.item-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;margin-left:8px;padding-top:2px}
.badge-type{font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.4);font-family:'Courier New',monospace;text-transform:uppercase;border:0.5px solid rgba(255,255,255,0.2);padding:2px 6px}
.badge-rarity{font-size:6px;letter-spacing:1.5px;font-family:'Courier New',monospace;text-transform:uppercase;padding:2px 6px;border:0.5px solid}

.dp-rule{width:100%;height:0.5px;background:rgba(255,255,255,0.18);margin-bottom:8px;flex-shrink:0}
.item-desc{font-size:9px;color:rgba(255,255,255,0.5);line-height:1.65;font-family:'Courier New',monospace;letter-spacing:0.2px;flex:1;overflow:hidden}
.item-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:8px 0;flex-shrink:0}
.stat{display:flex;flex-direction:column;gap:1px;padding:5px 6px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1)}
.stat-key{font-size:5.5px;letter-spacing:1.5px;color:rgba(255,255,255,0.28);text-transform:uppercase;font-family:'Courier New',monospace}
.stat-val{font-size:10px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.dp-actions{display:flex;gap:6px;flex-shrink:0}
.dp-btn{flex:1;padding:8px 0;font-size:7.5px;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;background:transparent;border:0.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.5);cursor:pointer;-webkit-tap-highlight-color:transparent}
.dp-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.dp-btn:active{opacity:0.6}

/* ── SIDE STRIP ── */
.side-strip{position:absolute;right:0;top:64px;width:20%;bottom:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;padding:14px 6px;gap:12px;overflow:hidden}
.side-label-v{writing-mode:vertical-rl;text-orientation:mixed;font-family:'Arial Black',Arial,sans-serif;font-size:11px;font-weight:900;color:#fff;letter-spacing:4px;transform:rotate(180deg)}
.side-divider{width:80%;height:0.5px;background:rgba(255,255,255,0.25);flex-shrink:0}
.cat-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:6px;letter-spacing:1px;text-transform:uppercase;font-family:'Courier New',monospace;color:rgba(255,255,255,0.55);border:0.5px solid rgba(255,255,255,0.3);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.cat-btn.active{background:rgba(255,255,255,0.2);color:#fff;border-color:#fff}
.cat-btn:active{opacity:0.6}
.side-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px}
.side-count{font-size:14px;font-weight:900;color:#fff;letter-spacing:-0.5px;font-family:'Arial Black',Arial,sans-serif}
.side-micro{font-size:5.5px;color:rgba(255,255,255,0.45);letter-spacing:1.5px;font-family:'Courier New',monospace;text-align:center}
</style>
</head>
<body>
<div class="layout">

  <div class="header-bar">
    <div class="header-title">INVENTAIRE</div>
    <div class="header-meta">
      <div class="hm-slots" id="hdr-slots">5 / 16 OBJETS</div>
      <div class="hm-weight" id="hdr-weight">1.18 KG</div>
    </div>
  </div>
  <div class="rule"></div>

  <div class="main-area">
    <div class="content-left">

      <!-- GRILLE D'INVENTAIRE -->
      <div class="inv-zone">
        <div class="inv-grid" id="invGrid"></div>
        <div class="inv-footer">
          <span class="if-label">EREBUS-7 · SECTEUR 4</span>
          <span class="if-label" id="footer-cap">CAPACITÉ 5/16</span>
        </div>
      </div>

      <!-- PANNEAU DÉTAIL -->
      <div class="detail-panel" id="detailPanel">
        <div class="dp-top">
          <div class="item-name empty" id="dp-name">— SÉLECTIONNER UN OBJET —</div>
          <div class="item-badges" id="dp-badges"></div>
        </div>
        <div class="dp-rule"></div>
        <div class="item-desc" id="dp-desc">Clique sur un emplacement pour afficher les informations de l'objet.</div>
        <div class="item-stats" id="dp-stats"></div>
        <div class="dp-actions" id="dp-actions"></div>
      </div>

    </div>

    <!-- SIDE STRIP -->
    <div class="side-strip">
      <span class="side-label-v">SLAYER</span>
      <div class="side-divider"></div>
      <div class="cat-btn active" data-cat="ALL">ALL</div>
      <div class="cat-btn" data-cat="DATA">DAT</div>
      <div class="cat-btn" data-cat="ÉQUIP">EQP</div>
      <div class="cat-btn" data-cat="ARMES">ARM</div>
      <div class="side-bottom">
        <div class="side-count" id="side-count">5</div>
        <div class="side-micro">OBJETS<br>EN SACK</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── ITEMS DATA ────────────────────────────────────────────────
const ITEMS = [
  {
    slot: 0, id: 'chip-lia',
    name: 'PUCE LIA-7', type: 'DATA', rarity: 'RARE', rarityColor: '#4488FF',
    icon: '◈', iconColor: '#C8FF00',
    desc: 'Fragment de mémoire extracté du noyau LIA. Contient des coordonnées chiffrées. Origine inconnue.',
    stats: { MASSE: '0.02 kg', SCAN: 'ACTIF', INTÉG: '78%' },
    qty: null,
  },
  {
    slot: 1, id: 'card-esc',
    name: 'ACCÈS ESC-α', type: 'ÉQUIP', rarity: 'COMMUN', rarityColor: 'rgba(255,255,255,0.35)',
    icon: '▣', iconColor: '#4488FF',
    desc: 'Badge d\'accès niveau Alpha. Valide dans les secteurs 1–4 d\'EREBUS-7. Expire le cycle 2026.',
    stats: { MASSE: '0.05 kg', NIVEAU: 'ALPHA', INTÉG: '100%' },
    qty: null,
  },
  {
    slot: 3, id: 'cell-omega',
    name: 'CELLULE Ω', type: 'ÉQUIP', rarity: 'COMMUN', rarityColor: 'rgba(255,255,255,0.35)',
    icon: '⬡', iconColor: '#FFB830',
    desc: 'Batterie haute densité. Recharge les systèmes actifs, armes à énergie et implants cybernétiques.',
    stats: { MASSE: '0.3 kg', CHARGE: '92%', CYCLES: '440' },
    qty: 3,
  },
  {
    slot: 6, id: 'tracker',
    name: 'TRACEUR BALISTIQUE', type: 'ARMES', rarity: 'RARE', rarityColor: '#4488FF',
    icon: '◉', iconColor: '#FF4422',
    desc: 'Marque une cible pour le système de guidage ESC. Portée : 800m. Signature thermique détectable.',
    stats: { MASSE: '0.8 kg', CHARGE: '44%', PORTÉE: '800m' },
    qty: null,
  },
  {
    slot: 10, id: 'doc-7',
    name: 'ORDRE 7-ALPHA', type: 'DATA', rarity: 'UNIQUE', rarityColor: '#C8FF00',
    icon: '≡', iconColor: '#C8FF00',
    desc: 'Document classifié ESC. Signé Commandant VELA. Mentionne LIA et le vecteur spatio-temporel.',
    stats: { MASSE: '0.01 kg', SCAN: 'CHIFF.', INTÉG: '100%' },
    qty: null,
  },
];

const SLOTS_TOTAL = 16;
let selectedSlot = null;
let activeCat = 'ALL';

const itemsBySlot = {};
ITEMS.forEach(it => itemsBySlot[it.slot] = it);

// ── BUILD GRID ────────────────────────────────────────────────
function buildGrid(filter) {
  const grid = document.getElementById('invGrid');
  grid.innerHTML = '';
  for (let i = 0; i < SLOTS_TOTAL; i++) {
    const item = itemsBySlot[i];
    const show = !item || filter === 'ALL' || item.type === filter;
    const el = document.createElement('div');
    el.className = 'slot' + (item && show ? ' filled' : '');
    if (i === selectedSlot) el.classList.add('selected');
    el.dataset.slot = i;
    if (item && show) {
      el.innerHTML = `
        <span class="slot-icon" style="color:${item.iconColor}">${item.icon}</span>
        <span class="slot-rarity" style="background:${item.rarityColor}"></span>
        ${item.qty ? `<span class="slot-qty">×${item.qty}</span>` : ''}
      `;
    }
    el.addEventListener('click', () => onSlotClick(i, item && show ? item : null));
    grid.appendChild(el);
  }
}

// ── SLOT CLICK ────────────────────────────────────────────────
function onSlotClick(slotIdx, item) {
  selectedSlot = slotIdx;
  buildGrid(activeCat);
  updateDetail(item);
}

// ── DETAIL PANEL ──────────────────────────────────────────────
function updateDetail(item) {
  const nameEl = document.getElementById('dp-name');
  const badgesEl = document.getElementById('dp-badges');
  const descEl = document.getElementById('dp-desc');
  const statsEl = document.getElementById('dp-stats');
  const actionsEl = document.getElementById('dp-actions');

  if (!item) {
    nameEl.textContent = '— EMPLACEMENT VIDE —';
    nameEl.className = 'item-name empty';
    badgesEl.innerHTML = '';
    descEl.textContent = 'Cet emplacement est disponible.';
    statsEl.innerHTML = '';
    actionsEl.innerHTML = '';
    return;
  }

  nameEl.textContent = item.name;
  nameEl.className = 'item-name';

  badgesEl.innerHTML = `
    <div class="badge-type">${item.type}</div>
    <div class="badge-rarity" style="color:${item.rarityColor};border-color:${item.rarityColor}">${item.rarity}</div>
  `;

  descEl.textContent = item.desc;

  statsEl.innerHTML = Object.entries(item.stats).map(([k, v]) => `
    <div class="stat">
      <span class="stat-key">${k}</span>
      <span class="stat-val">${v}</span>
    </div>
  `).join('');

  actionsEl.innerHTML = `
    <button class="dp-btn primary" onclick="useItem('${item.id}')">UTILISER</button>
    <button class="dp-btn" onclick="dropItem('${item.id}')">JETER</button>
    <button class="dp-btn" onclick="inspectItem('${item.id}')">INSPECTER</button>
  `;
}

// ── ITEM ACTIONS (hooks pour le jeu) ─────────────────────────
function useItem(id)     { console.log('USE', id); }
function dropItem(id)    { console.log('DROP', id); }
function inspectItem(id) { console.log('INSPECT', id); }

// ── CATEGORY FILTER ───────────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    selectedSlot = null;
    updateDetail(null);
    buildGrid(activeCat);
    // update side count
    const visible = activeCat === 'ALL' ? ITEMS.length : ITEMS.filter(it => it.type === activeCat).length;
    document.getElementById('side-count').textContent = visible;
  });
});

// ── INIT ──────────────────────────────────────────────────────
buildGrid('ALL');
updateDetail(null);
</script>
</body>
</html>
