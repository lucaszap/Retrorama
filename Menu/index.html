<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Rama</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #0a0a2a;
      overflow: hidden;
    }

    .logo-container {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 280px;
      height: 280px;
      cursor: pointer;
      z-index: 10;
    }

    .retro-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #stars-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>

<body>
  <div class="logo-container" id="logo-container">
    <img src="retro-rama-logo.png" alt="RETRO RAMA" class="retro-logo">
    <canvas id="stars-canvas"></canvas>
  </div>

  <script>
    // Fondu de sortie vers retrorama.html au clic
    document.getElementById('logo-container').addEventListener('click', function() {
      document.body.style.transition = 'opacity 0.5s ease';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = '../Projet/retrorama.html'; }, 500);
    });
  </script>
  <script>
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.querySelector('.logo-container');

    let width, height, centerX, centerY;
    let stars = [];
    let intensity = 0;
    let targetIntensity = 0;

    function resizeCanvas() {
      width = container.offsetWidth;
      height = container.offsetHeight;
      canvas.width = width;
      canvas.height = height;
      centerX = width / 2;
      centerY = height / 2;
    }

    class Star {
      constructor() {
        this.reset();
      }

      reset() {
        this.angle = Math.random() * Math.PI * 2;
        // Distance de départ très variée pour éviter l'effet "bloc"
        this.dist = Math.random() * 120 + 8;        // entre très proche et assez loin
        this.speed = Math.random() * 1.2 + 0.5;     // vitesse légèrement différente pour chaque étoile
        this.length = Math.random() * 28 + 14;
        this.brightness = Math.random() * 0.45 + 0.78;
        this.opacity = Math.random() * 0.4 + 0.3;   // opacité de base variable
      }

      update() {
        if (intensity > 0.06) {
          this.dist += this.speed * intensity; // Optionnel : multiplier par l'intensité pour plus de fluidité
          this.speed = Math.min(this.speed * 1.026, 19.5);
          
          if (this.dist > Math.max(width, height) * 1.65) {
            this.reset();
          }
        } else {
          this.speed = Math.random() * 1.2 + 0.5;
        }
      }

      draw() {
        const i = intensity;
        const x = centerX + Math.cos(this.angle) * this.dist;
        const y = centerY + Math.sin(this.angle) * this.dist;

        const prevDist = Math.max(0, this.dist - this.length * i);
        const px = centerX + Math.cos(this.angle) * prevDist;
        const py = centerY + Math.sin(this.angle) * prevDist;

        let alpha = this.brightness * Math.max(0.3, 1 - this.dist / (Math.max(width, height) * 0.75));
        alpha *= this.opacity;

        if (i < 0.12) {
          // Mode stable : étoiles éparpillées naturellement
          ctx.fillStyle = `rgba(255, 245, 230, ${this.brightness + Math.sin(Date.now()/350 + this.angle) * 0.17})`;
          ctx.fillRect(x - 1.35, y - 1.35, 2.7, 2.7);
        } else {
          // Mode hyperespace : traits
          ctx.strokeStyle = `rgba(255, 245, 215, ${alpha})`;
          ctx.lineWidth = 2.2 + i * 1.7;
          ctx.lineCap = "round";
          ctx.shadowBlur = 7 * i;
          ctx.shadowColor = "#ffe89f";

          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(x, y);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
      }
    }

    function initStars() {
      stars = [];
      // Moins d'étoiles pour un espace plus "vide" et naturel
      for (let i = 0; i < 110; i++) {
        stars.push(new Star());
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      // Le calcul se fait ici, une seule fois par rafraîchissement d'écran
      intensity += (targetIntensity - intensity) * 0.015; 

      for (let star of stars) {
        star.update();
        star.draw();
      }
    }

    function animate() {
      draw();
      requestAnimationFrame(animate);
    }

    container.addEventListener('mouseenter', () => targetIntensity = 1);
    container.addEventListener('mouseleave', () => targetIntensity = 0);

    container.addEventListener('touchstart', (e) => { e.preventDefault(); targetIntensity = 1; });
    container.addEventListener('touchend', () => targetIntensity = 0);

    window.addEventListener('load', () => {
      resizeCanvas();
      initStars();
      animate();

      window.addEventListener('resize', resizeCanvas);
    });
  </script>

</body>
</html>
